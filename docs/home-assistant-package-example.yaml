# Example Home Assistant package fragment for a Telegram -> HA -> LUMEN bridge.
# This keeps Telegram ingestion and WOODY wake/sleep in Home Assistant, while
# delegating AI processing and confirmation logic to LUMEN.

rest_command:
  lumen_assist:
    url: "http://10.0.0.100:8010/assist/process"
    method: POST
    timeout: 120
    content_type: "application/json"
    payload: >
      {
        "text": {{ text | tojson }},
        "conversation_id": {{ conversation_id | tojson }},
        "user_id": {{ user_id | default("home-assistant", true) | tojson }},
        "session_id": {{ conversation_id | tojson }},
        "language": "uk",
        "exposed_entities": {{ exposed_entities | default([], true) | tojson }}
      }

  lumen_assist_confirm:
    url: "http://10.0.0.100:8010/assist/confirm"
    method: POST
    timeout: 30
    content_type: "application/json"
    payload: >
      {
        "action_id": {{ action_id | tojson }},
        "confirmed": {{ (confirmed | string | lower in ['true', '1', 'yes', 'on']) | tojson }},
        "conversation_id": {{ conversation_id | tojson }},
        "user_id": {{ user_id | default("home-assistant", true) | tojson }}
      }

automation:
  - id: lumen_telegram_bridge_message
    alias: LUMEN Telegram Bridge Message
    description: >
      Receives Telegram text events in Home Assistant, wakes WOODY if needed,
      sends the text to LUMEN, returns the answer to Telegram, and restores the
      previous sleep state.
    triggers:
      - trigger: event
        event_type: telegram_text
    conditions:
      - condition: template
        value_template: >
          {{ trigger.event.data.text.split(' ', 1)[0] not in ['/confirm', '/cancel'] }}
    actions:
      - variables:
          sleep_state: "{{ states('binary_sensor.10_0_0_100') }}"
          chat_id: "{{ trigger.event.data.chat_id }}"
          incoming_text: "{{ trigger.event.data.text }}"
          conversation_id: "telegram:{{ trigger.event.data.chat_id }}"
          telegram_user_id: "{{ trigger.event.data.user_id | default(trigger.event.data.chat_id) }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ sleep_state == 'off' }}"
            sequence:
              - action: script.wakeup_woody
              - delay:
                  minutes: 1
      - action: rest_command.lumen_assist
        data:
          text: "{{ incoming_text }}"
          conversation_id: "{{ conversation_id }}"
          user_id: "{{ telegram_user_id }}"
          exposed_entities:
            - input_boolean.guest_mode
            - input_boolean.sleeping
            - script.turnoffeverything
        response_variable: lumen_reply
      - variables:
          lumen_status: "{{ lumen_reply['status'] | int(0) }}"
          lumen_content: "{{ lumen_reply['content'] if lumen_status == 200 else dict() }}"
          reply_message: >-
            {% if lumen_status != 200 %}
              LUMEN недоступний або повернув помилку. HTTP {{ lumen_status }}.
            {% elif lumen_content.get('requires_confirmation') and lumen_content.get('action_id') %}
              {{ lumen_content.get('speech', 'Потрібне підтвердження дії.') }}

              Підтвердити: /confirm {{ lumen_content.get('action_id') }}
              Скасувати: /cancel {{ lumen_content.get('action_id') }}
            {% else %}
              {{ lumen_content.get('speech', 'LUMEN не повернув текст відповіді.') }}
            {% endif %}
      - action: telegram_bot.send_message
        data:
          chat_id: "{{ chat_id }}"
          message: "{{ reply_message | trim }}"
          parse_mode: markdownv2
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ sleep_state == 'off' }}"
            sequence:
              - device_id: 68b20601f207575eaf65864d195f8a57
                domain: button
                entity_id: f66726fab20ba0b95af55af2a4dc7f5a
                type: press
    mode: single

  - id: lumen_telegram_bridge_confirm
    alias: LUMEN Telegram Bridge Confirm
    description: >
      Handles /confirm ACTION_ID and /cancel ACTION_ID commands from Telegram
      through Home Assistant and forwards them to LUMEN.
    triggers:
      - trigger: event
        event_type: telegram_text
    conditions:
      - condition: template
        value_template: >
          {{ trigger.event.data.text.split(' ', 1)[0] in ['/confirm', '/cancel'] }}
    actions:
      - variables:
          sleep_state: "{{ states('binary_sensor.10_0_0_100') }}"
          chat_id: "{{ trigger.event.data.chat_id }}"
          raw_text: "{{ trigger.event.data.text }}"
          command: "{{ raw_text.split(' ', 1)[0] }}"
          action_id: "{{ raw_text.split(' ', 1)[1] if ' ' in raw_text else '' }}"
          confirmed: "{{ command == '/confirm' }}"
          conversation_id: "telegram:{{ trigger.event.data.chat_id }}"
          telegram_user_id: "{{ trigger.event.data.user_id | default(trigger.event.data.chat_id) }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ sleep_state == 'off' }}"
            sequence:
              - action: script.wakeup_woody
              - delay:
                  minutes: 1
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ action_id != '' }}"
            sequence:
              - action: rest_command.lumen_assist_confirm
                data:
                  action_id: "{{ action_id }}"
                  confirmed: "{{ confirmed }}"
                  conversation_id: "{{ conversation_id }}"
                  user_id: "{{ telegram_user_id }}"
                response_variable: lumen_confirm_reply
              - variables:
                  lumen_status: "{{ lumen_confirm_reply['status'] | int(0) }}"
                  lumen_content: "{{ lumen_confirm_reply['content'] if lumen_status == 200 else dict() }}"
                  reply_message: >-
                    {% if lumen_status != 200 %}
                      LUMEN недоступний або повернув помилку. HTTP {{ lumen_status }}.
                    {% else %}
                      {{ lumen_content.get('speech', 'LUMEN не повернув текст відповіді.') }}
                    {% endif %}
              - action: telegram_bot.send_message
                data:
                  chat_id: "{{ chat_id }}"
                  message: "{{ reply_message | trim }}"
                  parse_mode: markdownv2
        default:
          - action: telegram_bot.send_message
            data:
              chat_id: "{{ chat_id }}"
              message: "Використай /confirm ACTION_ID або /cancel ACTION_ID"
              parse_mode: markdownv2
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ sleep_state == 'off' }}"
            sequence:
              - device_id: 68b20601f207575eaf65864d195f8a57
                domain: button
                entity_id: f66726fab20ba0b95af55af2a4dc7f5a
                type: press
    mode: single
